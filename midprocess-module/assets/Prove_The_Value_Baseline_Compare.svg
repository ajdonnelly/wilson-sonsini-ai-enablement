<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="Inter, Arial, sans-serif" role="img" aria-labelledby="t d"><title id="t">Proving value: baseline, measure, compare, communicate</title><desc id="d">A five-step loop — choose a metric, baseline it before, measure after, compare over time, communicate and improve — with an example showing task completion time falling from 95 to 58 minutes, a 39 percent improvement, sustained across four quarters.</desc><defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0f8c8c"/></marker></defs><rect width="1200" height="660" fill="#ffffff"/><text x="60" y="46" font-size="24" font-weight="700" fill="#16212b">Proving the workflow is better</text><text x="60" y="74" font-size="14.5" fill="#5a6672">A number is only evidence if you captured the baseline first.</text><rect x="60" y="108" width="196" height="60" rx="12" fill="#e1f5ee"/><circle cx="86" cy="138" r="13" fill="#0f8c8c"/><text x="86" y="143" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">1</text><text x="106" y="134" font-size="13" font-weight="600" fill="#0f6e56">Choose one</text><text x="106" y="151" font-size="13" font-weight="600" fill="#0f6e56">metric</text><line x1="259" y1="138" x2="274" y2="138" stroke="#0f8c8c" stroke-width="2.2" marker-end="url(#ah)"/><rect x="278" y="108" width="196" height="60" rx="12" fill="#e1f5ee"/><circle cx="304" cy="138" r="13" fill="#0f8c8c"/><text x="304" y="143" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">2</text><text x="324" y="134" font-size="13" font-weight="600" fill="#0f6e56">Baseline it</text><text x="324" y="151" font-size="13" font-weight="600" fill="#0f6e56">(before)</text><line x1="477" y1="138" x2="492" y2="138" stroke="#0f8c8c" stroke-width="2.2" marker-end="url(#ah)"/><rect x="496" y="108" width="196" height="60" rx="12" fill="#e1f5ee"/><circle cx="522" cy="138" r="13" fill="#0f8c8c"/><text x="522" y="143" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">3</text><text x="542" y="134" font-size="13" font-weight="600" fill="#0f6e56">Measure it</text><text x="542" y="151" font-size="13" font-weight="600" fill="#0f6e56">(after)</text><line x1="695" y1="138" x2="710" y2="138" stroke="#0f8c8c" stroke-width="2.2" marker-end="url(#ah)"/><rect x="714" y="108" width="196" height="60" rx="12" fill="#e1f5ee"/><circle cx="740" cy="138" r="13" fill="#0f8c8c"/><text x="740" y="143" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">4</text><text x="760" y="134" font-size="13" font-weight="600" fill="#0f6e56">Compare over</text><text x="760" y="151" font-size="13" font-weight="600" fill="#0f6e56">time</text><line x1="913" y1="138" x2="928" y2="138" stroke="#0f8c8c" stroke-width="2.2" marker-end="url(#ah)"/><rect x="932" y="108" width="196" height="60" rx="12" fill="#e1f5ee"/><circle cx="958" cy="138" r="13" fill="#0f8c8c"/><text x="958" y="143" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">5</text><text x="978" y="134" font-size="13" font-weight="600" fill="#0f6e56">Communicate &amp;</text><text x="978" y="151" font-size="13" font-weight="600" fill="#0f6e56">improve</text><rect x="60" y="212" width="520" height="360" rx="14" fill="#ffffff" stroke="#dfe4e7" stroke-width="1.5"/><text x="86" y="248" font-size="12.5" font-weight="800" fill="#0f6e56" letter-spacing="1.2">EXAMPLE · TASK COMPLETION TIME</text><rect x="180" y="370" width="100" height="170" rx="8" fill="#8a94a0"/><text x="230" y="356" font-size="17" font-weight="800" fill="#16212b" text-anchor="middle">95 min</text><text x="230" y="566" font-size="14" font-weight="600" fill="#5a6672" text-anchor="middle">Before</text><rect x="350" y="436" width="100" height="104" rx="8" fill="#0f8c8c"/><text x="400" y="422" font-size="17" font-weight="800" fill="#16212b" text-anchor="middle">58 min</text><text x="400" y="566" font-size="14" font-weight="600" fill="#5a6672" text-anchor="middle">After</text><line x1="150" y1="540" x2="500" y2="540" stroke="#dfe4e7" stroke-width="1.5"/><rect x="386" y="292" width="112" height="34" rx="17" fill="#e1f5ee"/><text x="442" y="315" font-size="16" font-weight="800" fill="#0f6e56" text-anchor="middle">−39%</text><rect x="620" y="212" width="520" height="360" rx="14" fill="#ffffff" stroke="#dfe4e7" stroke-width="1.5"/><text x="646" y="248" font-size="12.5" font-weight="800" fill="#0f6e56" letter-spacing="1.2">TRACK IT OVER TIME · QUARTERLY</text><rect x="690" y="370" width="72" height="170" rx="8" fill="#9fd8cd"/><text x="726" y="358" font-size="13.5" font-weight="700" fill="#16212b" text-anchor="middle">95</text><text x="726" y="566" font-size="13.5" font-weight="600" fill="#5a6672" text-anchor="middle">Q1</text><rect x="800" y="400" width="72" height="140" rx="8" fill="#9fd8cd"/><text x="836" y="388" font-size="13.5" font-weight="700" fill="#16212b" text-anchor="middle">78</text><text x="836" y="566" font-size="13.5" font-weight="600" fill="#5a6672" text-anchor="middle">Q2</text><rect x="910" y="429" width="72" height="111" rx="8" fill="#9fd8cd"/><text x="946" y="417" font-size="13.5" font-weight="700" fill="#16212b" text-anchor="middle">62</text><text x="946" y="566" font-size="13.5" font-weight="600" fill="#5a6672" text-anchor="middle">Q3</text><rect x="1020" y="436" width="72" height="104" rx="8" fill="#0f8c8c"/><text x="1056" y="424" font-size="13.5" font-weight="700" fill="#16212b" text-anchor="middle">58</text><text x="1056" y="566" font-size="13.5" font-weight="600" fill="#5a6672" text-anchor="middle">Q4</text><line x1="660" y1="540" x2="1110" y2="540" stroke="#dfe4e7" stroke-width="1.5"/><polyline points="726,370 836,400 946,429 1056,436" fill="none" stroke="#0f6e56" stroke-width="2.5" stroke-linecap="round"/><circle cx="726" cy="370" r="5" fill="#ffffff" stroke="#0f6e56" stroke-width="2.5"/><circle cx="836" cy="400" r="5" fill="#ffffff" stroke="#0f6e56" stroke-width="2.5"/><circle cx="946" cy="429" r="5" fill="#ffffff" stroke="#0f6e56" stroke-width="2.5"/><circle cx="1056" cy="436" r="5" fill="#ffffff" stroke="#0f6e56" stroke-width="2.5"/><text x="880" y="596" font-size="13" font-style="italic" fill="#5a6672" text-anchor="middle">Minutes per task — sustained, not a one-off</text><text x="600" y="618" font-size="14.5" font-weight="600" fill="#0f6e56" text-anchor="middle">Share it in a simple dashboard or summary — that is what builds credibility and keeps the improvement going.</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 990" font-family="Inter, Arial, sans-serif" role="img" aria-labelledby="t d"><title id="t">Workflow map template, vertical</title><desc id="d">Seven workflow steps flowing downward, each with its pain point, AI assist, and human check. Quality review is people-led with no AI.</desc><rect width="1120" height="990" fill="#ffffff"/><text x="60" y="46" font-size="24" font-weight="700" fill="#16212b">Map your workflow: step, pain point, AI, human check</text><text x="60" y="74" font-size="14.5" fill="#5a6672">Lay the process out and it becomes obvious where AI helps — and where it must not.</text><text x="60" y="104" font-size="12" font-weight="800" fill="#0f8c8c" letter-spacing="1.5">EXAMPLE · BUILDING A MEDICAL CHRONOLOGY</text><text x="165" y="160" font-size="12" font-weight="800" fill="#16212b" text-anchor="middle" letter-spacing="1.2">STEP</text><text x="406" y="160" font-size="12" font-weight="800" fill="#8a5206" text-anchor="middle" letter-spacing="1.2">PAIN POINT</text><text x="678" y="160" font-size="12" font-weight="800" fill="#0f6e56" text-anchor="middle" letter-spacing="1.2">AI ASSIST</text><text x="943" y="160" font-size="12" font-weight="800" fill="#16212b" text-anchor="middle" letter-spacing="1.2">HUMAN CHECK</text><line x1="165" y1="262" x2="165" y2="788" stroke="#0f8c8c" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/><rect x="60" y="176" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="219" r="14" fill="#0f8c8c"/><text x="86" y="224" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">1</text><text x="110" y="224" font-size="14" font-weight="700" fill="#ffffff">Receive records</text><path d="M159.0,265 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="176" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="224" font-size="12.8" fill="#8a5206" text-anchor="middle">High volume, mixed formats</text><rect x="542" y="176" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="215" font-size="12.8" fill="#0f6e56" text-anchor="middle">Ingest and index the full</text><text x="678" y="233" font-size="12.8" fill="#0f6e56" text-anchor="middle">set</text><rect x="826" y="176" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="224" font-size="12.8" fill="#16212b" text-anchor="middle">Confirm completeness</text><rect x="60" y="278" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="321" r="14" fill="#0f8c8c"/><text x="86" y="326" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">2</text><text x="110" y="326" font-size="14" font-weight="700" fill="#ffffff">Organize records</text><path d="M159.0,367 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="278" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="326" font-size="12.8" fill="#8a5206" text-anchor="middle">Manual sorting eats hours</text><rect x="542" y="278" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="317" font-size="12.8" fill="#0f6e56" text-anchor="middle">Auto-sort by date and</text><text x="678" y="335" font-size="12.8" fill="#0f6e56" text-anchor="middle">provider</text><rect x="826" y="278" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="326" font-size="12.8" fill="#16212b" text-anchor="middle">Spot-check the order</text><rect x="60" y="380" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="423" r="14" fill="#0f8c8c"/><text x="86" y="428" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">3</text><text x="110" y="419" font-size="14" font-weight="700" fill="#ffffff">Extract</text><text x="110" y="437" font-size="14" font-weight="700" fill="#ffffff">information</text><path d="M159.0,469 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="380" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="419" font-size="12.8" fill="#8a5206" text-anchor="middle">Dates and details get</text><text x="406" y="437" font-size="12.8" fill="#8a5206" text-anchor="middle">missed</text><rect x="542" y="380" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="419" font-size="12.8" fill="#0f6e56" text-anchor="middle">Extract dates, providers,</text><text x="678" y="437" font-size="12.8" fill="#0f6e56" text-anchor="middle">events</text><rect x="826" y="380" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="428" font-size="12.8" fill="#16212b" text-anchor="middle">Verify against source</text><rect x="60" y="482" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="525" r="14" fill="#0f8c8c"/><text x="86" y="530" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">4</text><text x="110" y="530" font-size="14" font-weight="700" fill="#ffffff">Create timeline</text><path d="M159.0,571 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="482" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="530" font-size="12.8" fill="#8a5206" text-anchor="middle">Slow to assemble by hand</text><rect x="542" y="482" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="530" font-size="12.8" fill="#0f6e56" text-anchor="middle">Draft the chronology table</text><rect x="826" y="482" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="530" font-size="12.8" fill="#16212b" text-anchor="middle">Confirm accuracy</text><rect x="60" y="584" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="627" r="14" fill="#0f8c8c"/><text x="86" y="632" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">5</text><text x="110" y="632" font-size="14" font-weight="700" fill="#ffffff">Identify gaps</text><path d="M159.0,673 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="584" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="632" font-size="12.8" fill="#8a5206" text-anchor="middle">Gaps are easy to overlook</text><rect x="542" y="584" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="632" font-size="12.8" fill="#0f6e56" text-anchor="middle">Flag missing periods</text><rect x="826" y="584" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="623" font-size="12.8" fill="#16212b" text-anchor="middle">Judge what actually</text><text x="943" y="641" font-size="12.8" fill="#16212b" text-anchor="middle">matters</text><rect x="60" y="686" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="729" r="14" fill="#0f8c8c"/><text x="86" y="734" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">6</text><text x="110" y="734" font-size="14" font-weight="700" fill="#ffffff">Quality review</text><path d="M159.0,775 l6,7 l6,-7" fill="none" stroke="#0f8c8c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="282" y="686" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="734" font-size="12.8" fill="#8a5206" text-anchor="middle">Standards vary by person</text><rect x="542" y="686" width="272" height="86" rx="10" fill="#eef1f3"/><text x="678" y="734" font-size="12.8" fill="#5a6672" text-anchor="middle">People lead — no AI here</text><rect x="826" y="686" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="734" font-size="12.8" fill="#16212b" text-anchor="middle">Attorney review and QC</text><rect x="60" y="788" width="210" height="86" rx="10" fill="#16212b"/><circle cx="86" cy="831" r="14" fill="#0f8c8c"/><text x="86" y="836" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle">7</text><text x="110" y="836" font-size="14" font-weight="700" fill="#ffffff">Finalize</text><rect x="282" y="788" width="248" height="86" rx="10" fill="#faeeda"/><text x="406" y="836" font-size="12.8" fill="#8a5206" text-anchor="middle">Formatting rework</text><rect x="542" y="788" width="272" height="86" rx="10" fill="#e1f5ee"/><text x="678" y="836" font-size="12.8" fill="#0f6e56" text-anchor="middle">Format to the firm template</text><rect x="826" y="788" width="234" height="86" rx="10" fill="#eef1f3"/><text x="943" y="836" font-size="12.8" fill="#16212b" text-anchor="middle">Sign-off and ownership</text><text x="560" y="926" font-size="14.5" font-weight="600" fill="#0f6e56" text-anchor="middle">Map your own the same way — one row per step, and be explicit about where a person must check.</text><text x="560" y="954" font-size="13" font-style="italic" fill="#5a6672" text-anchor="middle">Not every step gets AI. “Quality review” stays human — and that is the point.</text></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 770" font-family="Inter, Arial, sans-serif" role="img" aria-labelledby="t d"><title id="t">Metrics mature with adoption</title><desc id="d">Early in adoption, efficiency and morale metrics carry the most emphasis: time saved, speed to first draft, team satisfaction, user confidence. As workflows mature, emphasis shifts to scale and client impact: matter throughput and client responsiveness.</desc><defs><marker id="ah" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 z" fill="#0f8c8c"/></marker></defs><rect width="1200" height="770" fill="#ffffff"/><text x="60" y="46" font-size="24" font-weight="700" fill="#16212b">Your metrics should mature with your adoption</text><text x="60" y="74" font-size="14.5" fill="#5a6672">Early on, measure efficiency and morale. As workflows mature, measure scale and client impact.</text><line x1="72" y1="130" x2="72" y2="400" stroke="#dfe4e7" stroke-width="1.5"/><text x="66" y="126" font-size="11" font-weight="700" fill="#5a6672" text-anchor="end">MORE</text><text x="66" y="404" font-size="11" font-weight="700" fill="#5a6672" text-anchor="end">LESS</text><text x="66" y="268" font-size="11" font-weight="800" fill="#5a6672" text-anchor="end">EMPHASIS</text><line x1="90" y1="415" x2="1110" y2="415" stroke="#dfe4e7" stroke-width="1.5"/><line x1="600" y1="120" x2="600" y2="415" stroke="#dfe4e7" stroke-width="1.5" stroke-dasharray="5 5"/><rect x="512" y="104" width="176" height="26" rx="13" fill="#e1f5ee"/><text x="600" y="122" font-size="12.5" font-weight="800" fill="#0f6e56" text-anchor="middle">FOCUS SHIFTS HERE</text><path d="M90,190 C400,205 700,330 1110,372" fill="none" stroke="#57C9A8" stroke-width="4.5" stroke-linecap="round"/><path d="M90,378 C400,340 700,215 1110,186" fill="none" stroke="#0f6e56" stroke-width="4.5" stroke-linecap="round"/><text x="100" y="172" font-size="14.5" font-weight="700" fill="#57C9A8">Efficiency &amp; morale metrics</text><text x="1100" y="168" font-size="14.5" font-weight="700" fill="#0f6e56" text-anchor="end">Scale &amp; client-impact metrics</text><circle cx="600" cy="278" r="7" fill="#ffffff" stroke="#0f8c8c" stroke-width="3"/><text x="250" y="444" font-size="14" font-weight="700" fill="#16212b" text-anchor="middle">Early adoption</text><text x="600" y="444" font-size="14" font-weight="700" fill="#16212b" text-anchor="middle">Maturing workflows</text><text x="950" y="444" font-size="14" font-weight="700" fill="#16212b" text-anchor="middle">Mature operations</text><text x="600" y="468" font-size="12.5" font-style="italic" fill="#5a6672" text-anchor="middle">Adoption maturity →</text><rect x="90" y="505" width="490" height="240" rx="14" fill="#ffffff" stroke="#dfe4e7" stroke-width="1.5"/><path d="M104,505 h462 a14,14 0 0 1 14,14 v34 h-490 v-34 a14,14 0 0 1 14,-14 z" fill="#e1f5ee"/><text x="112" y="536" font-size="14.5" font-weight="800" fill="#0f6e56">EARLY — efficiency &amp; morale</text><rect x="112" y="559" width="124" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="130" cy="575" r="4.5" fill="#0f6e56"/><text x="142" y="580" font-size="13.5" font-weight="600" fill="#16212b">Time saved</text><rect x="112" y="603" width="208" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="130" cy="619" r="4.5" fill="#0f6e56"/><text x="142" y="624" font-size="13.5" font-weight="600" fill="#16212b">Speed to first draft</text><rect x="112" y="647" width="183" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="130" cy="663" r="4.5" fill="#0f6e56"/><text x="142" y="668" font-size="13.5" font-weight="600" fill="#16212b">Team satisfaction</text><rect x="112" y="691" width="166" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="130" cy="707" r="4.5" fill="#0f6e56"/><text x="142" y="712" font-size="13.5" font-weight="600" fill="#16212b">User confidence</text><rect x="620" y="505" width="490" height="240" rx="14" fill="#ffffff" stroke="#dfe4e7" stroke-width="1.5"/><path d="M634,505 h462 a14,14 0 0 1 14,14 v34 h-490 v-34 a14,14 0 0 1 14,-14 z" fill="#d3ece3"/><text x="642" y="536" font-size="14.5" font-weight="800" fill="#0f6e56">MATURE — scale &amp; client impact</text><rect x="642" y="559" width="183" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="660" cy="575" r="4.5" fill="#0f6e56"/><text x="672" y="580" font-size="13.5" font-weight="600" fill="#16212b">Matter throughput</text><rect x="642" y="603" width="216" height="32" rx="16" fill="#ffffff" stroke="#0f6e56" stroke-width="1.6"/><circle cx="660" cy="619" r="4.5" fill="#0f6e56"/><text x="672" y="624" font-size="13.5" font-weight="600" fill="#16212b">Client responsiveness</text><line x1="590" y1="620" x2="614" y2="620" stroke="#0f8c8c" stroke-width="3" marker-end="url(#ah)"/><text x="600" y="756" font-size="14.5" font-weight="600" fill="#0f6e56" text-anchor="middle">Early metrics never stop mattering — they just stop being the headline.</text></svg>